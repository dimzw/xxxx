        border-collapse: collapse;
        width: 90%;

        box-shadow: 0 8px 24px rgba(120, 129, 255, 0.05);

        padding: 14px 10px;
      }

        color: #86baff;
        border: 2px solid #cfcfcf;
      }
      .photo-cell {

      }
      .photo-cell img {
        display: block;
        width: auto;
        height: auto;
        max-height: 100px;
        object-fit: contain;
        margin: 0 auto;
